apiVersion: v1
kind: ConfigMap
metadata:
  name: ztp-config
  namespace: ztp
data:
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ztp"
  POSTGRES_USER: "ztp"
  API_PORT: "8080"
  JWT_EXPIRY: "24h"
  OIDC_ENABLED: "false"
  OIDC_ISSUER: ""
  OIDC_CLIENT_ID: ""
  OIDC_REDIRECT_URL: "https://ztp.example.com/api/v1/auth/oidc/callback"
  RENDERER_URL: "http://renderer:8001"
  RENDERER_PORT: "8001"
  TEMPLATE_DIR: "/templates"
  KEA_CTRL_AGENT_URL: "http://kea-ctrl-agent:8000"
  KEA_DHCP_INTERFACE: "eth0"
  SYSLOG_UDP_PORT: "514"
  SYSLOG_TCP_PORT: "514"
  ZTP_DOMAIN: "ztp.local"
  BIND_FORWARDER: "8.8.8.8"
