apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ztp
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      securityContext:
        runAsUser: 70       # postgres uid in official image
        runAsGroup: 70
        fsGroup: 70
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_DB,       valueFrom: { configMapKeyRef: { name: ztp-config, key: POSTGRES_DB } } }
            - { name: POSTGRES_USER,     valueFrom: { configMapKeyRef: { name: ztp-config, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef:    { name: ztp-secrets, key: POSTGRES_PASSWORD } } }
          ports:
            - containerPort: 5432
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: init, mountPath: /docker-entrypoint-initdb.d, readOnly: true }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ztp", "-d", "ztp"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-data }
        - name: init
          configMap: { name: postgres-init }
