system {
    host-name {{ hostname | default(serial | default('juniper-switch')) }};
    domain-name {{ domain | default('local') }};

    login {
        message "
*************************************************************
* AUTHORIZED ACCESS ONLY                                    *
* Unauthorized access is prohibited and will be prosecuted.*
* All sessions are monitored and logged.                    *
*************************************************************
";
        user admin {
            uid 2000;
            class super-user;
            authentication {
                plain-text-password "{{ local_password }}";
{% if ssh_public_key is defined %}
                ssh-rsa "{{ ssh_public_key }}";
{% endif %}
            }
        }
    }

    root-authentication {
        plain-text-password "{{ root_password | default(local_password) }}";
    }

    services {
        ssh {
            root-login deny;
            protocol-version v2;
            max-sessions-per-connection 4;
            client-alive-count-max 3;
            client-alive-interval 60;
        }
        netconf {
            ssh;
        }
    }

    syslog {
        user * {
            any emergency;
        }
        file messages {
            any notice;
            authorization info;
        }
    }
}

vlans {
    default {
        vlan-id 1;
        l3-interface irb.0;
    }
}

interfaces {
    irb {
        unit 0 {
            family inet {
                dhcp;
            }
        }
    }
}

{% if snmp_auth_pass is defined and snmp_priv_pass is defined %}
snmp {
    location "{{ location | default('Unknown') }}";
    contact "noc@{{ domain | default('local') }}";
    v3 {
        usm {
            local-engine {
                user snmp-admin {
                    authentication-sha {
                        authentication-password "{{ snmp_auth_pass }}";
                    }
                    privacy-aes128 {
                        privacy-password "{{ snmp_priv_pass }}";
                    }
                }
            }
        }
        vacm {
            security-to-group {
                security-model usm {
                    security-name snmp-admin {
                        group SNMP-RO;
                    }
                }
            }
            access {
                group SNMP-RO {
                    default-context-prefix {
                        security-model usm {
                            security-level privacy {
                                read-view all;
                            }
                        }
                    }
                }
            }
        }
    }
    view all {
        oid .1 include;
    }
}
{% endif %}
