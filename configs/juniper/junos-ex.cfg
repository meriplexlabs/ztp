system {
    host-name {{ hostname | default(serial | default('juniper-switch')) }};
    domain-name {{ domain | default('local') }};

    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "{{ encrypted_password }}";
            }
        }
    }

    root-authentication {
        encrypted-password "{{ encrypted_password }}";
    }

    services {
        ssh {
            root-login deny;
            protocol-version v2;
        }
    }
}

interfaces {
    vme {
        unit 0 {
            family inet {
                dhcp;
            }
        }
    }
}
