system {
    host-name {{ hostname }};
    domain-name {{ domain }};

    login {
        message "*** AUTHORIZED ACCESS ONLY -- Unauthorized access is prohibited. All sessions are monitored. ***";
        user admin {
            uid 2000;
            class super-user;
            authentication {
                plain-text-password "{{ local_password }}";
            }
        }
    }

    root-authentication {
        plain-text-password "{{ root_password }}";
    }

    services {
        ssh {
            root-login deny;
            protocol-version v2;
            max-sessions-per-connection 4;
            client-alive-count-max 3;
            client-alive-interval 60;
        }
    }
}

vlans {
    default {
        vlan-id 1;
        l3-interface irb.1;
    }
}

interfaces {
    irb {
        unit 1 {
            family inet {
                dhcp;
            }
        }
    }
}

snmp {
    location "{{ location }}";
    contact "noc@{{ domain }}";
    v3 {
        usm {
            local-engine {
                user snmp-admin {
                    authentication-sha {
                        authentication-password "{{ snmp_auth_pass }}";
                    }
                    privacy-aes128 {
                        privacy-password "{{ snmp_priv_pass }}";
                    }
                }
            }
        }
        vacm {
            security-to-group {
                security-model usm {
                    security-name snmp-admin {
                        group SNMP-RO;
                    }
                }
            }
            access {
                group SNMP-RO {
                    default-context-prefix {
                        security-model usm {
                            security-level privacy {
                                read-view all;
                            }
                        }
                    }
                }
            }
        }
    }
    view all {
        oid .1;
    }
}