system {
    host-name {{ hostname | default(serial | default('juniper-switch')) }};
    domain-name {{ domain | default('local') }};

    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                plain-text-password "{{ local_password }}";
            }
        }
    }

    root-authentication {
        plain-text-password "{{ local_password }}";
    }

    services {
        ssh {
            root-login deny;
            protocol-version v2;
        }
    }
}
