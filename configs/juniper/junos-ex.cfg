{# ============================================================
   Juniper EX/QFX/MX Base Template
   Required: hostname, encrypted_password
   Everything else is optional — omit vars you don't need
   ============================================================ #}

{# ── System ───────────────────────────────────────────────── #}
system {
    host-name {{ hostname | default(serial | default('juniper-device')) }};
{% if domain is defined %}
    domain-name {{ domain }};
{% endif %}
{% if dns_servers is defined %}
    name-server {
{% for ns in dns_servers %}
        {{ ns }};
{% endfor %}
    }
{% endif %}
{% if timezone is defined %}
    time-zone {{ timezone }};
{% endif %}
{% if login_banner is defined %}
    login {
        message "{{ login_banner }}";
    }
{% endif %}

    login {
{% if users is defined %}
{% for user in users %}
        user {{ user.name }} {
            uid {{ user.uid | default(loop.index + 2000) }};
            class {{ user.class | default('operator') }};
            authentication {
{% if user.encrypted_password is defined %}
                encrypted-password "{{ user.encrypted_password }}";
{% elif user.ssh_keys is defined %}
{% for key in user.ssh_keys %}
                ssh-rsa "{{ key }}";
{% endfor %}
{% endif %}
            }
        }
{% endfor %}
{% endif %}
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "{{ encrypted_password }}";
            }
        }
    }

    root-authentication {
        encrypted-password "{{ encrypted_password }}";
    }

    services {
        ssh {
            root-login deny;
            protocol-version v2;
{% if ssh_max_sessions is defined %}
            connection-limit {{ ssh_max_sessions }};
{% endif %}
{% if ssh_rate_limit is defined %}
            rate-limit {{ ssh_rate_limit }};
{% endif %}
        }
{% if telnet_enabled is defined and telnet_enabled %}
        telnet;
{% endif %}
{% if netconf_enabled is defined and netconf_enabled %}
        netconf {
            ssh;
        }
{% endif %}
{% if http_enabled is defined and http_enabled %}
        web-management {
            http;
        }
{% endif %}
{% if https_enabled is defined and https_enabled %}
        web-management {
            https {
                system-generated-certificate;
            }
        }
{% endif %}
    }

{% if syslog is defined %}
    syslog {
{% if syslog.hosts is defined %}
{% for host in syslog.hosts %}
        host {{ host.address }} {
            any {{ host.level | default('notice') }};
{% if host.port is defined %}
            port {{ host.port }};
{% endif %}
        }
{% endfor %}
{% endif %}
        file messages {
            any notice;
            authorization info;
        }
        file interactive-commands {
            interactive-commands any;
        }
    }
{% endif %}

{% if ntp_servers is defined %}
    ntp {
{% for ntp in ntp_servers %}
        server {{ ntp }};
{% endfor %}
{% if ntp_source_address is defined %}
        source-address {{ ntp_source_address }};
{% endif %}
    }
{% endif %}

{% if tacacs is defined %}
    tacplus-server {
{% for srv in tacacs.servers %}
        {{ srv }} {
            secret "{{ tacacs.secret }}";
{% if tacacs.source_address is defined %}
            source-address {{ tacacs.source_address }};
{% endif %}
            single-connection;
        }
{% endfor %}
    }
    authentication-order [ tacplus password ];
    accounting {
        events [ login change-log interactive-commands ];
        destination {
            tacplus;
        }
    }
{% endif %}

{% if radius is defined %}
    radius-server {
{% for srv in radius.servers %}
        {{ srv }} {
            secret "{{ radius.secret }}";
{% if radius.source_address is defined %}
            source-address {{ radius.source_address }};
{% endif %}
        }
{% endfor %}
    }
    authentication-order [ radius password ];
{% endif %}

{% if max_config_rollbacks is defined %}
    max-configuration-rollbacks {{ max_config_rollbacks }};
{% endif %}
{% if commit_synchronize is defined and commit_synchronize %}
    commit synchronize;
{% endif %}

    archival {
        configuration {
            transfer-on-commit;
        }
    }
}

{# ── Chassis ──────────────────────────────────────────────── #}
{% if virtual_chassis is defined %}
chassis {
    aggregated-devices {
        ethernet {
            device-count {{ ae_count | default(16) }};
        }
    }
{% if virtual_chassis.members is defined %}
    virtual-chassis {
        preprovisioned;
{% for member in virtual_chassis.members %}
        member {{ member.id }} {
            role {{ member.role | default('line-card') }};
            serial-number {{ member.serial }};
        }
{% endfor %}
    }
{% endif %}
}
{% elif ae_count is defined %}
chassis {
    aggregated-devices {
        ethernet {
            device-count {{ ae_count }};
        }
    }
}
{% endif %}

{# ── Interfaces ───────────────────────────────────────────── #}
interfaces {

{# Management interface #}
{% if mgmt_interface is defined %}
    {{ mgmt_interface }} {
        unit 0 {
            family inet {
{% if mgmt_ip is defined %}
                address {{ mgmt_ip }}/{{ mgmt_prefix | default(24) }};
{% else %}
                dhcp;
{% endif %}
            }
        }
    }
{% else %}
    vme {
        unit 0 {
            family inet {
{% if mgmt_ip is defined %}
                address {{ mgmt_ip }}/{{ mgmt_prefix | default(24) }};
{% else %}
                dhcp;
{% endif %}
            }
        }
    }
{% endif %}

{# Loopback #}
{% if loopback_ip is defined %}
    lo0 {
        unit 0 {
            family inet {
                address {{ loopback_ip }}/32;
{% if loopback_filter is defined %}
                filter {
                    input {{ loopback_filter }};
                }
{% endif %}
            }
        }
    }
{% endif %}

{# Uplink / routed interfaces #}
{% if uplinks is defined %}
{% for ul in uplinks %}
    {{ ul.interface }} {
{% if ul.description is defined %}
        description "{{ ul.description }}";
{% endif %}
{% if ul.mtu is defined %}
        mtu {{ ul.mtu }};
{% endif %}
{% if ul.speed is defined %}
        speed {{ ul.speed }};
{% endif %}
{% if ul.duplex is defined %}
        link-mode {{ ul.duplex }};
{% endif %}
        unit 0 {
{% if ul.vlan_id is defined %}
            vlan-id {{ ul.vlan_id }};
{% endif %}
            family inet {
                address {{ ul.ip }}/{{ ul.prefix }};
            }
{% if ul.ipv6 is defined %}
            family inet6 {
                address {{ ul.ipv6 }};
            }
{% endif %}
        }
    }
{% endfor %}
{% endif %}

{# LAG / Aggregated Ethernet #}
{% if ae_interfaces is defined %}
{% for ae in ae_interfaces %}
    {{ ae.name }} {
{% if ae.description is defined %}
        description "{{ ae.description }}";
{% endif %}
{% if ae.mtu is defined %}
        mtu {{ ae.mtu }};
{% endif %}
        aggregated-ether-options {
            minimum-links {{ ae.min_links | default(1) }};
{% if ae.lacp is defined %}
            lacp {
                {{ ae.lacp.mode | default('active') }};
{% if ae.lacp.period is defined %}
                periodic {{ ae.lacp.period }};
{% endif %}
{% if ae.lacp.system_id is defined %}
                system-id {{ ae.lacp.system_id }};
{% endif %}
            }
{% endif %}
        }
        unit 0 {
{% if ae.vlan_id is defined %}
            vlan-id {{ ae.vlan_id }};
{% endif %}
{% if ae.ip is defined %}
            family inet {
                address {{ ae.ip }}/{{ ae.prefix }};
            }
{% endif %}
{% if ae.trunk is defined and ae.trunk %}
            family ethernet-switching {
                interface-mode trunk;
                vlan {
                    members [ {% for v in ae.allowed_vlans %}{{ v }} {% endfor %}];
                }
{% if ae.native_vlan is defined %}
                native-vlan-id {{ ae.native_vlan }};
{% endif %}
            }
{% endif %}
        }
    }
{% endfor %}
{% endif %}

{# Access / trunk ports from profile port map #}
{% if ports is defined %}
{% for port in ports %}
    {{ port.port }} {
{% if port.description is defined and port.description %}
        description "{{ port.description }}";
{% endif %}
{% if port.disabled is defined and port.disabled %}
        disable;
{% endif %}
{% if port.speed is defined %}
        speed {{ port.speed }};
{% endif %}
{% if port.storm_control is defined %}
        unit 0 {
            family ethernet-switching {
                storm-control {{ port.storm_control }};
            }
        }
{% endif %}
{% if port.allowed_vlans is defined and port.allowed_vlans %}
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan {
                    members [ {{ port.allowed_vlans | replace(',', ' ') }} ];
                }
{% if port.native_vlan is defined %}
                native-vlan-id {{ port.native_vlan }};
{% endif %}
            }
        }
{% else %}
        unit 0 {
            family ethernet-switching {
                interface-mode access;
                vlan {
                    members vlan{{ port.native_vlan | default(1) }};
                }
            }
        }
{% endif %}
    }
{% endfor %}
{% endif %}

}

{# ── VLANs ────────────────────────────────────────────────── #}
{% if vlans is defined %}
vlans {
{% for vlan in vlans %}
    vlan{{ vlan.id }} {
        vlan-id {{ vlan.id }};
{% if vlan.name is defined and vlan.name %}
        description "{{ vlan.name }}";
{% endif %}
{% if vlan.l3_interface is defined %}
        l3-interface {{ vlan.l3_interface }};
{% endif %}
    }
{% endfor %}
}
{% endif %}

{# ── Routing Options ──────────────────────────────────────── #}
{% if default_gateway is defined or static_routes is defined or router_id is defined or autonomous_system is defined %}
routing-options {
{% if router_id is defined %}
    router-id {{ router_id }};
{% endif %}
{% if autonomous_system is defined %}
    autonomous-system {{ autonomous_system }};
{% endif %}
{% if default_gateway is defined %}
    static {
        route 0.0.0.0/0 next-hop {{ default_gateway }};
    }
{% endif %}
{% if static_routes is defined %}
    static {
{% for route in static_routes %}
        route {{ route.prefix }} {
{% if route.next_hop is defined %}
            next-hop {{ route.next_hop }};
{% endif %}
{% if route.discard is defined and route.discard %}
            discard;
{% endif %}
{% if route.description is defined %}
            qualified-next-hop {{ route.next_hop }} {
                preference 5;
            }
{% endif %}
        }
{% endfor %}
    }
{% endif %}
{% if routing_instances is defined %}
    instance-type virtual-router;
{% endif %}
}
{% endif %}

{# ── OSPF ─────────────────────────────────────────────────── #}
{% if ospf is defined %}
protocols {
    ospf {
{% if ospf.reference_bandwidth is defined %}
        reference-bandwidth {{ ospf.reference_bandwidth }};
{% endif %}
{% for area in ospf.areas %}
        area {{ area.id }} {
{% for iface in area.interfaces %}
            interface {{ iface.name }} {
{% if iface.passive is defined and iface.passive %}
                passive;
{% endif %}
{% if iface.hello_interval is defined %}
                hello-interval {{ iface.hello_interval }};
{% endif %}
{% if iface.dead_interval is defined %}
                dead-interval {{ iface.dead_interval }};
{% endif %}
{% if iface.metric is defined %}
                metric {{ iface.metric }};
{% endif %}
{% if iface.authentication is defined %}
                authentication {
                    md5 1 key "{{ iface.authentication }}";
                }
{% endif %}
            }
{% endfor %}
        }
{% endfor %}
    }
}
{% endif %}

{# ── BGP ──────────────────────────────────────────────────── #}
{% if bgp is defined %}
protocols {
    bgp {
{% if bgp.log_updown is defined and bgp.log_updown %}
        log-updown;
{% endif %}
{% if bgp.graceful_restart is defined and bgp.graceful_restart %}
        graceful-restart;
{% endif %}
{% for group in bgp.groups %}
        group {{ group.name }} {
            type {{ group.type | default('external') }};
{% if group.local_address is defined %}
            local-address {{ group.local_address }};
{% endif %}
{% if group.peer_as is defined %}
            peer-as {{ group.peer_as }};
{% endif %}
{% if group.local_as is defined %}
            local-as {{ group.local_as }};
{% endif %}
{% if group.import_policy is defined %}
            import {{ group.import_policy }};
{% endif %}
{% if group.export_policy is defined %}
            export {{ group.export_policy }};
{% endif %}
{% if group.auth_key is defined %}
            authentication-key "{{ group.auth_key }}";
{% endif %}
{% if group.hold_time is defined %}
            hold-time {{ group.hold_time }};
{% endif %}
{% for neighbor in group.neighbors %}
            neighbor {{ neighbor.address }} {
{% if neighbor.description is defined %}
                description "{{ neighbor.description }}";
{% endif %}
{% if neighbor.peer_as is defined %}
                peer-as {{ neighbor.peer_as }};
{% endif %}
            }
{% endfor %}
        }
{% endfor %}
    }
}
{% endif %}

{# ── Spanning Tree ────────────────────────────────────────── #}
{% if stp is defined %}
protocols {
    {{ stp.protocol | default('rstp') }} {
{% if stp.bridge_priority is defined %}
        bridge-priority {{ stp.bridge_priority }};
{% endif %}
{% if stp.max_age is defined %}
        max-age {{ stp.max_age }};
{% endif %}
{% if stp.hello_time is defined %}
        hello-time {{ stp.hello_time }};
{% endif %}
{% if stp.forward_delay is defined %}
        forward-delay {{ stp.forward_delay }};
{% endif %}
{% if stp.interfaces is defined %}
{% for iface in stp.interfaces %}
        interface {{ iface.name }} {
{% if iface.edge is defined and iface.edge %}
            edge;
            no-root-port;
{% endif %}
{% if iface.cost is defined %}
            cost {{ iface.cost }};
{% endif %}
        }
{% endfor %}
{% endif %}
    }
}
{% endif %}

{# ── LLDP ─────────────────────────────────────────────────── #}
{% if lldp_enabled is defined and lldp_enabled %}
protocols {
    lldp {
        interface all;
{% if lldp_med_enabled is defined and lldp_med_enabled %}
        interface all {
            tlv-filter lldp-med;
        }
{% endif %}
    }
}
{% endif %}

{# ── SNMP ─────────────────────────────────────────────────── #}
{% if snmp is defined %}
snmp {
{% if snmp.location is defined %}
    location "{{ snmp.location }}";
{% endif %}
{% if snmp.contact is defined %}
    contact "{{ snmp.contact }}";
{% endif %}
{% if snmp.communities is defined %}
{% for community in snmp.communities %}
    community {{ community.name }} {
        authorization {{ community.authorization | default('read-only') }};
{% if community.clients is defined %}
        clients {
{% for client in community.clients %}
            {{ client }};
{% endfor %}
        }
{% endif %}
    }
{% endfor %}
{% endif %}
{% if snmp.v3 is defined %}
    v3 {
{% for user in snmp.v3.users %}
        usm {
            local-engine {
                user {{ user.name }} {
                    authentication-sha {
                        authentication-key "{{ user.auth_key }}";
                    }
{% if user.priv_key is defined %}
                    privacy-aes128 {
                        privacy-key "{{ user.priv_key }}";
                    }
{% endif %}
                }
            }
        }
        vacm {
            security-to-group {
                security-model usm {
                    security-name {{ user.name }} {
                        group {{ user.group | default('read-only-group') }};
                    }
                }
            }
        }
{% endfor %}
    }
{% endif %}
{% if snmp.traps is defined %}
    trap-group {{ snmp.traps.group | default('default') }} {
        version {{ snmp.traps.version | default('v2') }};
        targets {
{% for target in snmp.traps.targets %}
            {{ target }};
{% endfor %}
        }
    }
{% endif %}
}
{% endif %}

{# ── CoS / QoS ────────────────────────────────────────────── #}
{% if cos is defined %}
class-of-service {
{% if cos.classifiers is defined %}
    classifiers {
{% for clf in cos.classifiers %}
        dscp {{ clf.name }} {
{% for entry in clf.entries %}
            forwarding-class {{ entry.fc }} {
                loss-priority {{ entry.loss_priority | default('low') }} code-points {{ entry.code_points }};
            }
{% endfor %}
        }
{% endfor %}
    }
{% endif %}
{% if cos.schedulers is defined %}
    schedulers {
{% for sched in cos.schedulers %}
        {{ sched.name }} {
            transmit-rate percent {{ sched.transmit_rate_pct }};
            buffer-size percent {{ sched.buffer_pct | default(sched.transmit_rate_pct) }};
            priority {{ sched.priority | default('low') }};
        }
{% endfor %}
    }
{% endif %}
{% if cos.interfaces is defined %}
    interfaces {
{% for iface in cos.interfaces %}
        {{ iface.name }} {
{% if iface.scheduler_map is defined %}
            scheduler-map {{ iface.scheduler_map }};
{% endif %}
{% if iface.unit_scheduler_map is defined %}
            unit 0 {
                scheduler-map {{ iface.unit_scheduler_map }};
            }
{% endif %}
        }
{% endfor %}
    }
{% endif %}
}
{% endif %}

{# ── Firewall Filters ─────────────────────────────────────── #}
{% if firewall_filters is defined %}
firewall {
    family inet {
{% for flt in firewall_filters %}
        filter {{ flt.name }} {
{% for term in flt.terms %}
            term {{ term.name }} {
{% if term.match is defined %}
                from {
{% if term.match.source_prefix is defined %}
                    source-address {
{% for pfx in term.match.source_prefix %}
                        {{ pfx }};
{% endfor %}
                    }
{% endif %}
{% if term.match.destination_prefix is defined %}
                    destination-address {
{% for pfx in term.match.destination_prefix %}
                        {{ pfx }};
{% endfor %}
                    }
{% endif %}
{% if term.match.protocol is defined %}
                    protocol {{ term.match.protocol }};
{% endif %}
{% if term.match.port is defined %}
                    port {{ term.match.port }};
{% endif %}
{% if term.match.dscp is defined %}
                    dscp {{ term.match.dscp }};
{% endif %}
                }
{% endif %}
                then {
                    {{ term.action | default('accept') }};
{% if term.count is defined %}
                    count {{ term.count }};
{% endif %}
{% if term.log is defined and term.log %}
                    log;
{% endif %}
                }
            }
{% endfor %}
        }
{% endfor %}
    }
}
{% endif %}

{# ── Routing Instances (VRF) ──────────────────────────────── #}
{% if routing_instances is defined %}
routing-instances {
{% for vrf in routing_instances %}
    {{ vrf.name }} {
        instance-type {{ vrf.type | default('virtual-router') }};
{% if vrf.interfaces is defined %}
{% for iface in vrf.interfaces %}
        interface {{ iface }};
{% endfor %}
{% endif %}
{% if vrf.route_distinguisher is defined %}
        route-distinguisher {{ vrf.route_distinguisher }};
{% endif %}
{% if vrf.vrf_target is defined %}
        vrf-target {{ vrf.vrf_target }};
{% endif %}
{% if vrf.default_gateway is defined %}
        routing-options {
            static {
                route 0.0.0.0/0 next-hop {{ vrf.default_gateway }};
            }
        }
{% endif %}
    }
{% endfor %}
}
{% endif %}

{# ── 802.1X ───────────────────────────────────────────────── #}
{% if dot1x is defined %}
protocols {
    dot1x {
        authenticator {
{% if dot1x.radius_servers is defined %}
{% for srv in dot1x.radius_servers %}
            radius-server {{ srv }};
{% endfor %}
{% endif %}
{% if dot1x.interfaces is defined %}
{% for iface in dot1x.interfaces %}
            interface {{ iface.name }} {
                supplicant {{ iface.supplicant | default('single-secure') }};
{% if iface.retries is defined %}
                retries {{ iface.retries }};
{% endif %}
{% if iface.quiet_period is defined %}
                quiet-period {{ iface.quiet_period }};
{% endif %}
{% if iface.guest_vlan is defined %}
                guest-vlan {{ iface.guest_vlan }};
{% endif %}
{% if iface.server_reject_vlan is defined %}
                server-reject-vlan {{ iface.server_reject_vlan }};
{% endif %}
            }
{% endfor %}
{% endif %}
        }
    }
}
{% endif %}

{# ── Storm Control ────────────────────────────────────────── #}
{% if storm_control_profiles is defined %}
forwarding-options {
    storm-control {
{% for profile in storm_control_profiles %}
        interface {{ profile.name }} {
{% if profile.bandwidth_level is defined %}
            bandwidth-level {{ profile.bandwidth_level }};
{% endif %}
{% if profile.no_multicast is defined and profile.no_multicast %}
            no-multicast;
{% endif %}
{% if profile.no_unknown_unicast is defined and profile.no_unknown_unicast %}
            no-unknown-unicast;
{% endif %}
        }
{% endfor %}
    }
}
{% endif %}

{# ── DHCP Snooping / ARP Inspection ──────────────────────── #}
{% if dhcp_snooping is defined %}
vlans {
{% for vlan_id in dhcp_snooping.vlans %}
    vlan{{ vlan_id }} {
        forwarding-options {
            dhcp-security;
        }
    }
{% endfor %}
}
{% endif %}
{% if arp_inspection is defined %}
vlans {
{% for vlan_id in arp_inspection.vlans %}
    vlan{{ vlan_id }} {
        forwarding-options {
            arp-inspection;
        }
    }
{% endfor %}
}
{% endif %}

{# ── PoE ──────────────────────────────────────────────────── #}
{% if poe is defined %}
poe {
{% if poe.management is defined %}
    management {{ poe.management }};
{% endif %}
{% if poe.interfaces is defined %}
{% for iface in poe.interfaces %}
    interface {{ iface.name }} {
{% if iface.max_power is defined %}
        maximum-power {{ iface.max_power }};
{% endif %}
{% if iface.priority is defined %}
        priority {{ iface.priority }};
{% endif %}
{% if iface.disabled is defined and iface.disabled %}
        disable;
{% endif %}
    }
{% endfor %}
{% endif %}
}
{% endif %}
