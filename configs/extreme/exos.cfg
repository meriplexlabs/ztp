# --- Hostname & Domain ---
configure snmp sysName {{ hostname }}
configure dns-client default-domain {{ domain }}

# --- Local User ---
create account admin admin {{ local_password }}
configure account admin password {{ local_password }}

# --- Management VLAN1 with DHCP ---
configure vlan Default ipaddress dhcp
enable dhcp vlan Default

# --- SSH Hardening ---
# Disable telnet, enable SSHv2 only
disable telnet
enable ssh2
configure ssh2 key

# --- Disable unused services ---
disable snmp access
disable web http
disable web https

# --- SNMP v3 ---
configure snmpv3 add user snmp-admin authentication sha {{ snmp_auth_pass }} privacy aes {{ snmp_priv_pass }}
configure snmpv3 add group SNMP-RO user snmp-admin sec-model usm
configure snmpv3 add access SNMP-RO sec-model usm sec-level priv read-view allMIBs notify-view allMIBs
configure snmp sysLocation {{ location }}
configure snmp sysContact "noc@{{ domain }}"

# --- Banner ---
configure banner
*************************************************************
* AUTHORIZED ACCESS ONLY                                    *
* Unauthorized access is prohibited and will be prosecuted.*
* All sessions are monitored and logged.                    *
*************************************************************
.
save configuration