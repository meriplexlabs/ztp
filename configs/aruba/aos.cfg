hostname {{ hostname | default(serial | default('aruba-switch')) }}

! --- Management VLAN1 with DHCP ---
vlan 1
   name DEFAULT_VLAN
   ip address dhcp-bootp

! --- Local user ---
password manager user-name admin plaintext {{ local_password }}

! --- SSH ---
crypto key generate ssh rsa
ip ssh version 2
no telnet-server

{% if snmp_auth_pass is defined and snmp_priv_pass is defined %}
! --- SNMP v3 ---
snmpv3 user snmp-admin auth sha {{ snmp_auth_pass }} priv aes {{ snmp_priv_pass }}
snmpv3 group SNMP-RO user snmp-admin sec-model ver3
snmpv3 access SNMP-RO match-prefix "" sec-model ver3 sec-level authpriv read-view "all" write-view "" notify-view ""
snmp-server location "{{ location | default('Unknown') }}"
snmp-server contact noc@{{ domain | default('local') }}
{% endif %}

banner motd @
*************************************************************
* AUTHORIZED ACCESS ONLY                                    *
* Unauthorized access is prohibited and will be prosecuted.*
* All sessions are monitored and logged.                    *
*************************************************************
@
