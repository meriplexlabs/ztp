# --- Hostname ---
config system global
    set hostname {{ hostname }}
    set admintimeout 15
end

# --- Local Admin User ---
config system admin
    edit admin
        set password {{ local_password }}
        set accprofile super_admin
    next
end

# --- Management VLAN1 with DHCP ---
config system interface
    edit internal
        set ip 0.0.0.0 0.0.0.0
        set mode dhcp
        set allowaccess ssh
        set type physical
    next
end

# --- SSH Hardening ---
config system global
    set admin-ssh-port 22
    set strong-crypto enable
end

# Disable insecure access methods on mgmt interface
config system interface
    edit internal
        set allowaccess ssh
    next
end

# --- SNMP v3 ---
config system snmp sysinfo
    set status enable
    set description {{ hostname }}
    set location {{ location }}
    set contact-info noc@{{ domain }}
end

config system snmp user
    edit snmp-admin
        set security-level auth-priv
        set auth-proto sha
        set auth-pwd {{ snmp_auth_pass }}
        set priv-proto aes
        set priv-pwd {{ snmp_priv_pass }}
        set queries enable
        set trap-status enable
    next
end

# --- Banner ---
config system global
    set pre-login-banner enable
end

config system replacemsg admin pre_admin-disclaimer
    set buffer "*************************************************************
* AUTHORIZED ACCESS ONLY                                    *
* Unauthorized access is prohibited and will be prosecuted.*
* All sessions are monitored and logged.                    *
*************************************************************"
end