hostname {{ hostname | default(serial | default('switch')) }}
ip domain-name {{ domain | default('local') }}

username admin privilege 15 algorithm-type scrypt secret {{ local_password }}
enable algorithm-type scrypt secret {{ enable_secret | default(local_password) }}

service password-encryption

interface Vlan1
 ip address dhcp
 no shutdown

ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3

line vty 0 15
 transport input ssh
 login local
 exec-timeout 15 0
 privilege level 15

line con 0
 login local
 exec-timeout 15 0

{% if snmp_auth_pass is defined and snmp_priv_pass is defined %}
no snmp-server community public
no snmp-server community private
snmp-server group SNMP-RO v3 priv
snmp-server user snmp-admin SNMP-RO v3 auth sha {{ snmp_auth_pass }} priv aes 128 {{ snmp_priv_pass }}
snmp-server location {{ location | default('Unknown') }}
snmp-server contact noc@{{ domain | default('local') }}
{% endif %}

banner motd #
*************************************************************
* AUTHORIZED ACCESS ONLY                                    *
* Unauthorized access is prohibited and will be prosecuted.*
* All sessions are monitored and logged.                    *
*************************************************************
#

end
