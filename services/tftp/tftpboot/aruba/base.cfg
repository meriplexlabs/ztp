; HP ProCurve 2920 base ZTP config
; Applied automatically via DHCP option 66/67 on first boot.
; Default credentials: admin / ZtpAdmin1234!
; After device appears in dashboard, assign a profile and manage via terminal.

hostname aruba-ztp
ip default-gateway 0.0.0.0

vlan 1
   name DEFAULT_VLAN
   ip address dhcp-bootp
   exit

password manager plaintext ZtpAdmin1234!
no password operator

ip ssh version 2
no telnet-server enable
