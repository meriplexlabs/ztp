! AOS-CX Base ZTP Configuration
! Applied automatically via DHCP option 66/67 on first boot.
! Credentials: admin / ZtpAdmin1234!
! After device appears in the dashboard, assign a profile and push
! the full config via the push-config button.

hostname aruba-provisioned

user admin group administrators password plaintext ZtpAdmin1234!

ssh server vrf mgmt
https-server vrf mgmt

interface mgmt
    ip dhcp
    no shutdown
