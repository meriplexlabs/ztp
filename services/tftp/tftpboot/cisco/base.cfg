version 17
service timestamps debug datetime msec localtime
service timestamps log datetime msec localtime
service password-encryption
!
no ip domain lookup
ip domain name meriplexlabs.com
!
username mpsupport privilege 15 secret itw!this0101
enable secret itw!this0101
!
aaa new-model
aaa authentication login default local
aaa authorization exec default local if-authenticated
!
interface Vlan1
 ip address dhcp
 no shutdown
!
ip ssh version 2
ip ssh authentication-retries 3
!
line con 0
 logging synchronous
 login local
!
line vty 0 15
 login local
 transport input ssh
!
end
