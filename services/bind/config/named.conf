options {
    directory "/var/cache/bind";

    forwarders {
        ${BIND_FORWARDER:-8.8.8.8};
        8.8.4.4;
    };

    forward only;

    // Allow queries from any host on the internal network
    allow-query { any; };
    allow-recursion { any; };

    dnssec-validation no;
    listen-on { any; };
    listen-on-v6 { none; };
};

logging {
    channel default_log {
        stderr;
        severity info;
        print-time yes;
        print-severity yes;
        print-category yes;
    };
    category default { default_log; };
};

// ZTP internal zone
zone "${ZTP_DOMAIN:-ztp.local}" IN {
    type master;
    file "/etc/bind/zones/ztp.local.zone";
};
