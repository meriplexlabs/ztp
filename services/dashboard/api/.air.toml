root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/ztp-api ./cmd/api/main.go"
  bin = "./tmp/ztp-api"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor"]
  delay = 500

[log]
  time = true

[color]
  main = "yellow"
  watcher = "cyan"
  build = "green"
  runner = "magenta"

[misc]
  clean_on_exit = true
